version: '3.8'

services:
  backend:
    build: .
    container_name: smart-traffic-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/traffic_ai
    depends_on:
      - db
    volumes:
      - ./backend:/app/backend
    command: python main.py

  db:
    image: postgres:14
    container_name: smart-traffic-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=traffic_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    image: nginx:latest
    container_name: smart-traffic-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  default:
    name: smart-traffic-network
